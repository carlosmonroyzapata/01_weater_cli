<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clima Premium | Tu Dashboard Meteorológico</title>
    <!-- React & Babel for direct execution in browser -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [ciudad, setCiudad] = useState('');
            const [clima, setClima] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            const buscarClima = async (e) => {
                if (e) e.preventDefault();
                if (!ciudad.trim()) return;

                setLoading(true);
                setError('');
                setClima(null);

                try {
                    // Nota: Cambiar este puerto si el backend corre en uno distinto
                    const response = await fetch(`http://localhost:8000/api/weather?ciudad=${encodeURIComponent(ciudad)}`);
                    if (!response.ok) {
                        const errData = await response.json();
                        throw new Error(errData.detail || 'No se pudo obtener el clima');
                    }
                    const data = await response.json();
                    setClima(data);
                } catch (err) {
                    setError(err.message);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="container">
                    <div className="glass-card main-card">
                        <header>
                            <h1>Clima<span>Premium</span></h1>
                            <p className="subtitle">Consulta el tiempo con estilo</p>
                        </header>

                        <form onSubmit={buscarClima} className="search-box">
                            <input 
                                type="text" 
                                placeholder="Escribe una ciudad..." 
                                value={ciudad}
                                onChange={(e) => setCiudad(e.target.value)}
                            />
                            <button type="submit" disabled={loading}>
                                {loading ? <div className="spinner"></div> : 'Buscar'}
                            </button>
                        </form>

                        {error && <div className="error-message">{error}</div>}

                        {clima && (
                            <div className="weather-display fadeIn">
                                <div className="weather-main">
                                    <div className="weather-info">
                                        <div className="city-name">{clima.nombre}</div>
                                        <div className="temp">{Math.round(clima.temp)}°<span>C</span></div>
                                        <div className="description">{clima.descripcion}</div>
                                    </div>
                                    <div className="weather-icon">
                                        <img src={`http://openweathermap.org/img/wn/${clima.icono}@4x.png`} alt="Icono clima" />
                                    </div>
                                </div>
                                <div className="weather-details">
                                    <div className="detail-item">
                                        <span className="label">Humedad</span>
                                        <span className="value">{clima.humedad}%</span>
                                    </div>
                                    {/* Podríamos agregar más detalles aquí si el backend los provee */}
                                </div>
                            </div>
                        )}

                        {!clima && !loading && !error && (
                            <div className="welcome-state">
                                <p>Descubre el clima en cualquier parte del mundo</p>
                            </div>
                        )}
                    </div>
                    
                    <footer className="author">
                        Refactorizado por Antigravity
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
