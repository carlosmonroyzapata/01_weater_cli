<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App - FastAPI</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f2f5; }
        .card { background: white; padding: 2rem; border-radius: 10px; shadow: 0 4px 6px rgba(0,0,0,0.1); margin-top: 2rem; width: 300px; text-align: center; }
        select, button { padding: 10px; margin: 10px 0; width: 100%; border-radius: 5px; border: 1px solid #ccc; }
        button { background-color: #007bff; color: white; cursor: pointer; border: none; }
        .weather-info { margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px; }
    </style>
</head>
<body>

    <h1>Consulta el Clima</h1>

    <div class="card">
        <form action="/clima" method="post">
            <label for="ciudad">Elige una ciudad:</label>
            <select name="ciudad" id="ciudad">
                <option value="Madrid">Madrid, España</option>
                <option value="Mexico City">Ciudad de México, México</option>
                <option value="Buenos Aires">Buenos Aires, Argentina</option>
                <option value="Bogota">Bogotá, Colombia</option>
                <option value="Santiago">Santiago, Chile</option>
                <option value="Lima">Lima, Perú</option>
            </select>
            <button type="submit">Ver Clima</button>
        </form>

        {% if error %}
            <p style="color: red;">{{ error }}</p>
        {% endif %}

        {% if clima %}
            <div class="weather-info">
                <h2>{{ clima.nombre }}</h2>
                <img src="http://openweathermap.org/img/wn/{{ clima.icono }}@2x.png" alt="Icono clima">
                <p style="font-size: 2rem; margin: 0;">{{ clima.temp }}°C</p>
                <p><strong>Estado:</strong> {{ clima.descripcion }}</p>
                <p><strong>Humedad:</strong> {{ clima.humedad }}%</p>
            </div>
        {% endif %}
    </div>

</body>
</html>
